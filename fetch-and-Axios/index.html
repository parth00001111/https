<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  LinkedIn
  <div id="posts">

  </div>
  <script>
    async function getRecentPost() {

      const response = await fetch("https://jsonplaceholder.typicode.com/posts/1")//as we update or scroll in media this sends req automatically//
      const data = await response.json()
      document.querySelector("#posts").innerHTML = data.body;
    }
    getRecentPost();
  </script>
  
</body>
</html>
